<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Globe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: #080810;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
 
    /* Starfield */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 8% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 65%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 47% 8%,  rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 68% 45%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 83% 28%, rgba(255,255,255,0.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 18% 82%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 58% 88%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 91% 72%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 38% 38%, rgba(255,255,255,0.55) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 73% 12%, rgba(255,255,255,0.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 55%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 3% 50%,  rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 96% 40%, rgba(255,255,255,0.35) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }
 
    .scene {
      position: relative;
      z-index: 1;
      width: min(560px, 92vw);
      height: min(560px, 92vw);
    }
 
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      border-radius: 50%;
    }
    canvas:active { cursor: grabbing; }
 
    /* Continent floating widget */
    .continent-tag {
      position: absolute;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: opacity 0.4s ease, transform 0.1s linear;
      z-index: 10;
    }
 
    .continent-tag .bubble {
      background: rgba(63, 46, 13, 0.75);
      border: 0.5px solid rgba(192, 132, 252, 0.3);
      border-radius: 8px;
      padding: 5px 10px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      position: relative;
    }
 
    .continent-tag .bubble::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 5px;
      background: rgba(247, 160, 19, 0.5);
    }
 
    .continent-tag .dot {
      position: absolute;
      bottom: -9px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #d4842e;
    }
 
    .continent-tag .name {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f89f22;
    }
 
    .continent-tag .sub {
      font-size: 8px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.35);
    }
 
    .continent-tag.hidden {
      opacity: 0;
    }

    .place-tag {
      position: absolute;
      pointer-events: none;
      transform: translate(-50%, -60%);
      transition: opacity 0.4s ease, transform 0.1s linear;
      z-index: 9;
    }

    .place-tag .label {
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 2px 6px 1px;
      white-space: nowrap;
      backdrop-filter: blur(4px);
    }

    .place-tag.hidden {
      opacity: 0;
    }
  </style>
</head>

<script>
(function () {
  const canvas = document.getElementById('globe');
  const scene  = document.getElementById('scene');
 
  // Continent anchor points (lat, lon) — rough center of each landmass
  const continents = [
    { name: 'North America', sub: 'Americas',      location: [45.0,  -100.0] },
    { name: 'South America', sub: 'Americas',      location: [-15.0,  -55.0] },
    { name: 'Europe',        sub: 'Eurasia',        location: [54.0,    15.0] },
    { name: 'Africa',        sub: '54 countries',   location: [2.0,    22.0]  },
    { name: 'Asia',          sub: 'Eurasia',        location: [45.0,    90.0] },
    { name: 'Oceania',       sub: 'Pacific',        location: [-25.0,  135.0] },
    { name: 'Antarctica',    sub: 'South Pole',     location: [-80.0,    0.0] },
  ];
 
  const markers = [
    { location: [37.7595, -122.4367], size: 0.04 },
    { location: [40.7128, -74.006],   size: 0.05 },
    { location: [35.6762, 139.6503],  size: 0.04 },
    { location: [51.5074, -0.1278],   size: 0.04 },
    { location: [-33.8688, 151.2093], size: 0.04 },
    { location: [-33.9249, 18.4241],  size: 0.04 },
    { location: [25.2048, 55.2708],   size: 0.04 },
    { location: [48.8566, 2.3522],    size: 0.04 },
    { location: [-23.5505, -46.6333], size: 0.04 },
    { location: [19.0760, 72.8777],   size: 0.04 },
  ];

  const places = [
    { name: 'San Francisco', location: [37.7595, -122.4367] },
    { name: 'New York',      location: [40.7128, -74.006] },
    { name: 'Tokyo',         location: [35.6762, 139.6503] },
    { name: 'London',        location: [51.5074, -0.1278] },
    { name: 'Sydney',        location: [-33.8688, 151.2093] },
    { name: 'Cape Town',     location: [-33.9249, 18.4241] },
    { name: 'Dubai',         location: [25.2048, 55.2708] },
    { name: 'Paris',         location: [48.8566, 2.3522] },
    { name: 'Sao Paulo',     location: [-23.5505, -46.6333] },
    { name: 'Mumbai',        location: [19.0760, 72.8777] },
  ];
 
  const arcPairs = [[0,2],[1,3],[3,6],[6,9],[2,4],[8,1],[5,7],[7,0]];
  const arcs = arcPairs.map(([a,b]) => ({ from: markers[a].location, to: markers[b].location }));
 
  // Build DOM tags for each continent
  const tags = continents.map((c, i) => {
    const el = document.createElement('div');
    el.className = 'continent-tag hidden';
    el.id = 'ct-' + i;
    el.innerHTML = `
      <div class="bubble">
        <span class="name">${c.name}</span>
        <span class="sub">${c.sub}</span>
        <div class="dot"></div>
      </div>`;
    scene.appendChild(el);
    return el;
  });

  const placeTags = places.map((p, i) => {
    const el = document.createElement('div');
    el.className = 'place-tag hidden';
    el.id = 'pt-' + i;
    el.innerHTML = `<span class="label">${p.name}</span>`;
    scene.appendChild(el);
    return el;
  });
 
  let phi = 0, userPhi = 0, isDragging = false, lastX = 0;
  let globe;
 
  function toRad(d) { return d * Math.PI / 180; }
 
  function project(lat, lon) {
    const THETA = 0.3;
    const latR = toRad(lat), lonR = toRad(lon);
    let x = Math.cos(latR) * Math.cos(lonR);
    let y = Math.sin(latR);
    let z = Math.cos(latR) * Math.sin(lonR);
 
    const totalPhi = phi + userPhi;
    const cp = Math.cos(totalPhi), sp = Math.sin(totalPhi);
    const rx = cp * x - sp * z;
    const rz = sp * x + cp * z;
    x = rx; z = rz;
 
    const ct = Math.cos(THETA), st = Math.sin(THETA);
    const ry = ct * y - st * z;
    const rz2 = st * y + ct * z;
    y = ry; z = rz2;
 
    const rect = canvas.getBoundingClientRect();
    const cx = rect.width / 2, cy = rect.height / 2;
    const r = Math.min(cx, cy) * 0.9;
    return {
      sx: cx + x * r,
      sy: cy - y * r,
      visible: z > 0.1,
    };
  }
 
  function updateTags() {
    continents.forEach((c, i) => {
      const p = project(c.location[0], c.location[1]);
      const el = tags[i];
      el.style.left = p.sx + 'px';
      el.style.top  = p.sy + 'px';
      el.classList.toggle('hidden', !p.visible);
    });

    places.forEach((p, i) => {
      const pos = project(p.location[0], p.location[1]);
      const el = placeTags[i];
      el.style.left = pos.sx + 'px';
      el.style.top  = (pos.sy - 10) + 'px';
      el.classList.toggle('hidden', !pos.visible);
    });
  }
 
  function buildConfig() {
    const size = Math.min(scene.offsetWidth, scene.offsetHeight);
    const dpr  = Math.min(window.devicePixelRatio || 1, 2);
    return {
      devicePixelRatio: dpr,
      width: size * dpr, height: size * dpr,
      phi: 0, theta: 0.3,
      dark: 1, diffuse: 1.2, scale: 1,
      mapSamples: 16000, mapBrightness: 6, mapBaseBrightness: 0,
      baseColor:   [0.1, 0.08, 0.15],
      markerColor: [0.75, 0.3, 1.0],
      glowColor:   [0.35, 0.15, 0.6],
      arcColor:    [1, 0.45, 0.75],
      markers, arcs,
      onRender(state) {
        if (!isDragging) phi += 0.003;
        state.phi = phi + userPhi;
        updateTags();
      },
    };
  }
 
  function init() {
    if (globe) globe.destroy();
    const size = Math.min(scene.offsetWidth, scene.offsetHeight);
    const dpr  = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width  = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width  = size + 'px';
    canvas.style.height = size + 'px';
    globe = createGlobe(canvas, buildConfig());
  }
 
  init();
 
  canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; });
  window.addEventListener('mouseup',   () => { isDragging = false; });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    userPhi += (e.clientX - lastX) * 0.005;
    lastX = e.clientX;
  });
  canvas.addEventListener('touchstart', e => { isDragging = true; lastX = e.touches[0].clientX; }, { passive: true });
  window.addEventListener('touchend',   () => { isDragging = false; });
  window.addEventListener('touchmove',  e => {
    if (!isDragging) return;
    userPhi += (e.touches[0].clientX - lastX) * 0.005;
    lastX = e.touches[0].clientX;
  }, { passive: true });
 
  window.addEventListener('resize', init);
})();
</script>

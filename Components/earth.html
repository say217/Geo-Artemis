<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Black & White Rotating Earth Globe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 18px;
            text-shadow: 0 0 12px rgba(255,255,255,0.6);
            pointer-events: none;
            z-index: 100;
            text-align: center;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>FUCK ARNAB</strong><br>
        <small>Auto-rotating • Drag mouse to orbit • Scroll to zoom</small>
    </div>

    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <script>
        let scene, camera, renderer;
        let earth;
        let isDragging = false;
        let previousMouseX = 0;
        let previousMouseY = 0;

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // === BLACK & WHITE EARTH ===
            const geometry = new THREE.SphereGeometry(6.5, 128, 128);

            const textureLoader = new THREE.TextureLoader();

            const earthTexture = textureLoader.load(
                'https://unpkg.com/three-globe@2.31.0/example/img/earth-blue-marble.jpg'
            );
            const bumpTexture = textureLoader.load(
                'https://unpkg.com/three-globe@2.31.0/example/img/earth-topology.png'
            );

            const material = new THREE.MeshPhongMaterial({
                map: earthTexture,
                bumpMap: bumpTexture,
                bumpScale: 0.06,
                color: new THREE.Color(0xffffff),      // pure white
                emissive: new THREE.Color(0x000000),   // no glow
                shininess: 12,
                specular: new THREE.Color(0x111111)    // deep black specular
            });

            earth = new THREE.Mesh(geometry, material);
            scene.add(earth);

            // === PURE BLACK & WHITE LIGHTS ===
            const ambientLight = new THREE.AmbientLight(0x222222, 0.85);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
            directionalLight.position.set(12, 6, 10);
            scene.add(directionalLight);

            const backLight = new THREE.DirectionalLight(0x555555, 0.35);
            backLight.position.set(-10, -5, -10);
            scene.add(backLight);

            // === STARS (pure white) ===
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 15000;
            const positions = new Float32Array(starsCount * 3);
            const colors = new Float32Array(starsCount * 3);

            for (let i = 0; i < starsCount * 3; i += 3) {
                const radius = 300;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                positions[i]     = radius * Math.sin(phi) * Math.cos(theta);
                positions[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i + 2] = radius * Math.cos(phi);

                const brightness = 0.85 + Math.random() * 0.15;
                colors[i]     = brightness;
                colors[i + 1] = brightness;
                colors[i + 2] = brightness;
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const starsMaterial = new THREE.PointsMaterial({
                size: 0.7,
                vertexColors: true,
                transparent: true,
                opacity: 0.95
            });

            const starField = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(starField);

            // === CONTROLS ===
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('mousedown', onMouseDown);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mouseup', onMouseUp);
            renderer.domElement.addEventListener('mouseleave', onMouseUp);
            renderer.domElement.addEventListener('wheel', onWheel);

            animate();
        }

        function onMouseDown(e) {
            if (e.button === 0) {
                isDragging = true;
                previousMouseX = e.clientX;
                previousMouseY = e.clientY;
            }
        }

        function onMouseUp() {
            isDragging = false;
        }

        function onMouseMove(e) {
            if (!isDragging) return;
            const deltaX = e.clientX - previousMouseX;
            const deltaY = e.clientY - previousMouseY;

            earth.rotation.y += deltaX * 0.005;
            earth.rotation.x += deltaY * 0.005;
            earth.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, earth.rotation.x));

            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        }

        function onWheel(e) {
            camera.position.z += e.deltaY * 0.02;
            camera.position.z = Math.max(8, Math.min(30, camera.position.z));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isDragging) {
                earth.rotation.y += 0.0014;
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
